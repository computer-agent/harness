pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{ts,tsx,js,jsx,json,css}"
      run: npx biome check --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true
    typecheck:
      run: npx tsc --noEmit
    typecheck-web:
      glob: "web/**/*.{ts,tsx}"
      run: cd web && npx tsc -b
